<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Ajay Damodaran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Audiowide', sans-serif;
      background: linear-gradient(150deg, #003d6b 0%, #005d93 55%, #1a7abf 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .navbar-brand {
      color: white;
      font-size: 0.95rem;
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .navbar-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .navbar-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      transition: color 0.2s ease;
    }

    .navbar-links a:hover { color: white; }

    .navbar-links .nav-icon {
      display: flex;
      align-items: center;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .navbar-links .nav-icon:hover { opacity: 1; }
    .navbar-links .nav-icon svg { width: 20px; height: 20px; fill: white; }

    /* Page Layout */
    .contact-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
    }

    .contact-card {
      background: white;
      border-radius: 16px;
      padding: 50px 48px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .contact-card h1 {
      font-size: 1.8rem;
      color: #005d93;
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    .contact-card .subtitle {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group.no-margin { margin-bottom: 0; }

    label {
      font-size: 0.68rem;
      color: #005d93;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    label .optional {
      color: #aaa;
      font-size: 0.6rem;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 4px;
    }

    input, textarea {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.78rem;
      padding: 12px 14px;
      border: 1.5px solid #dde3ea;
      border-radius: 8px;
      color: #1a2332;
      background: #f8fafc;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: #005d93;
      box-shadow: 0 0 0 3px rgba(0, 93, 147, 0.12);
      background: white;
    }

    input.error, textarea.error {
      border-color: #e74c3c;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    .error-msg {
      font-size: 0.62rem;
      color: #e74c3c;
      margin-top: 2px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .submit-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'Audiowide', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(249,115,22,0.4);
    }

    .submit-btn:active { transform: translateY(0); }

    .note {
      font-size: 0.62rem;
      color: #aaa;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }

    footer {
      background: #001d35;
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 20px;
      font-size: 0.65rem;
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      .contact-card { padding: 36px 24px; }
      .form-row { grid-template-columns: 1fr; }
      .navbar { padding: 14px 20px; }
      .navbar-links { gap: 16px; }
      .contact-card h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">Ajay Damodaran</a>
    <ul class="navbar-links">
      <li><a href="/about.html">About</a></li>
      <li><a href="/#shows">Upcoming Shows</a></li>
      <li>
        <a href="https://www.youtube.com/@AjayDamodaran" target="_blank" class="nav-icon" aria-label="YouTube">
          <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </a>
      </li>
      <li>
        <a href="https://www.instagram.com/ajaydamodaran_/" target="_blank" class="nav-icon" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Contact Form -->
  <div class="contact-page">
    <div class="contact-card">
      <h1>Get In Touch</h1>
      <p class="subtitle">Want to work together? Me too! Fill this out and I'll get back to you.</p>

      <div class="form-row">
        <div class="form-group no-margin">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" placeholder="Greatest">
          <span class="error-msg" id="err-first">Required</span>
        </div>
        <div class="form-group no-margin">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" placeholder="Ever">
          <span class="error-msg" id="err-last">Required</span>
        </div>
      </div>

      <div class="form-group">
        <label for="org">Organization <span class="optional">(optional)</span></label>
        <input type="text" id="org" placeholder="Comedy Club, Curious Person, Corporate Sponsor, etc.">
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="I want you to...">
        <span class="error-msg" id="err-subject">Required</span>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="...be a part of my '(thing)' on 'date'. It is a '(type of thing)'"></textarea>
        <span class="error-msg" id="err-message">Required</span>
      </div>

      <button class="submit-btn" onclick="sendEmail()">Send Message</button>
      <p class="note">Clicking Send will open your email client with this message pre-filled.</p>
    </div>
  </div>

  <footer>
    &copy; 2026 Ajay Damodaran Comedy. All rights reserved.
  </footer>

  <script>
    function validate(id, errId) {
      const el = document.getElementById(id);
      const err = document.getElementById(errId);
      if (!el.value.trim()) {
        el.classList.add('error');
        err.classList.add('visible');
        return false;
      }
      el.classList.remove('error');
      err.classList.remove('visible');
      return true;
    }

    function sendEmail() {
      const ok = [
        validate('first-name', 'err-first'),
        validate('last-name',  'err-last'),
        validate('subject',    'err-subject'),
        validate('message',    'err-message'),
      ].every(Boolean);

      if (!ok) return;

      const first   = document.getElementById('first-name').value.trim();
      const last    = document.getElementById('last-name').value.trim();
      const org     = document.getElementById('org').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();

      const orgLine = org ? `Organization: ${org}\n` : '';
      const body = `From: ${first} ${last}\n${orgLine}\n${message}`;

      const mailto = `mailto:ajaydamodarancomedy@gmail.com`
        + `?subject=${encodeURIComponent(subject)}`
        + `&body=${encodeURIComponent(body)}`;

      window.location.href = mailto;
    }

    // Clear error on input
    ['first-name','last-name','subject','message'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('error');
        const errId = 'err-' + id.replace('first-name','first').replace('last-name','last');
        const err = document.getElementById(errId);
        if (err) err.classList.remove('visible');
      });
    });
  </script>

</body>
</html>
